name: main

on:
  push:
    # Only build branches on push, tags will be handled by 'release' job.
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            freebsd-amd64,
            linux-amd64,
            linux-arm,
            linux-arm64,
            openbsd-amd64,
            windows-x64,
          ]
        include:
          # - target: linux-amd64
          #   os: linux
          #   arch: amd64
          #   ext: ""
          # - target: linux-arm64
          #   os: linux
          #   arch: arm64
          #   ext: ""
          # - target: linux-arm
          #   os: linux
          #   arch: arm
          #   ext: ""
          # - target: freebsd-amd64
          #   os: freebsd
          #   arch: amd64
          #   ext: ""
          - target: openbsd-amd64
            os: openbsd
            arch: amd64
            ext: ""
          - target: windows-x64
            os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Build Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build/${{ matrix.target }}
          go build -ldflags "-s -w" -o build/${{ matrix.target }}/ ./...

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: qtv-${{ matrix.target }}
          path: build/${{ matrix.target }}/qtv*
          compression-level: 9
          retention-days: 3

  upload:
    needs: build
    runs-on: ubuntu-latest
    # if: github.repository == 'QW-Group/qtv' && ((github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'release')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build

      # - name: Setup SSH
      #   env:
      #     SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK > /dev/null
      #     ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Set date
        run: echo "DATE=$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          # Determine type
          IS_RELEASE=false
          if [[ $GITHUB_REF == refs/tags/* ]]; then
              IS_RELEASE=true
          fi

          # Process builds
          for DIR_PATH in build/qtv-*; do
              FILE_PATH=$(find "$DIR_PATH" -maxdepth 1 -type f -name "qtv*" | head -n1)
              FILENAME=$(basename "$FILE_PATH")    # qtv or qtv.exe

              DIR_NAME=$(basename "$DIR_PATH")     # qtv-linux-amd64
              OS_ARCH="${DIR_NAME#qtv-}"           # linux-amd64
              OS="${OS_ARCH%-*}"                   # linux
              ARCH="${OS_ARCH##*-}"                # amd64

              CHECKSUM_PATH="$FILE_PATH.md5"
              md5sum "$FILE_PATH" > "$CHECKSUM_PATH"

              if $IS_RELEASE; then
                  BASE_DIR="upload/releases"
                  VERSION_DIR="${BASE_DIR}/${GITHUB_REF_NAME}/${OS}/${ARCH}"
              else
                  BASE_DIR="upload/snapshots"
                  VERSION_DIR="${BASE_DIR}/${OS}/${ARCH}"
              fi

              LATEST_DIR="${BASE_DIR}/latest/${OS}/${ARCH}"

              mkdir -p "$VERSION_DIR" "$LATEST_DIR"

              if $IS_RELEASE; then
                  cp "$FILE_PATH" "$VERSION_DIR/$FILENAME"
                  cp "$CHECKSUM_PATH" "$VERSION_DIR/$FILENAME.md5"
              else
                  SNAP_NAME="${DATE}_${GITHUB_SHA::7}_$FILENAME"
                  cp "$FILE_PATH" "$VERSION_DIR/$SNAP_NAME"
                  cp "$CHECKSUM_PATH" "$VERSION_DIR/$SNAP_NAME.md5"
              fi

              cp "$FILE_PATH" "$LATEST_DIR/$FILENAME"
              cp "$CHECKSUM_PATH" "$LATEST_DIR/$FILENAME.md5"
          done

          # SFTP upload
          if $IS_RELEASE; then
              REMOTE_DIR=/releases
              LOCAL_DIR=upload/releases
          else
              REMOTE_DIR=/snapshots
              LOCAL_DIR=upload/snapshots
          fi

          echo $REMOTE_DIR
          tree $LOCAL_DIR

          # sftp -rp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }} <<< $"put -rp $local_dir/* $remote_dir"

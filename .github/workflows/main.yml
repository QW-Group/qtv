name: main

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            freebsd-amd64,
            linux-amd64,
            linux-arm,
            linux-arm64,
            openbsd-amd64,
            windows-x64,
          ]
        include:
          - target: freebsd-amd64
            os: freebsd
            arch: amd64
            ext: ""
          - target: linux-amd64
            os: linux
            arch: amd64
            ext: ""
          - target: linux-arm64
            os: linux
            arch: arm64
            ext: ""
          - target: linux-arm
            os: linux
            arch: arm
            ext: ""
          - target: openbsd-amd64
            os: openbsd
            arch: amd64
            ext: ""
          - target: windows-x64
            os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Build Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build/${{ matrix.target }}
          go build -ldflags "-s -w" -o build/${{ matrix.target }}/ ./...

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: qtv-${{ matrix.target }}
          path: build/${{ matrix.target }}/qtv*
          compression-level: 9
          retention-days: 3

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build

      - name: Deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          IS_RELEASE=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              IS_RELEASE=true
          fi

          if $IS_RELEASE; then
              LOCAL_BASE_DIR="upload/releases"
              REMOTE_BASE_DIR="/releases"
          else
              LOCAL_BASE_DIR="upload/snapshots"
              REMOTE_BASE_DIR="/snapshots"
          fi

          for DIR_PATH in build/qtv-*; do
              FILE_PATH=$(find "${DIR_PATH}" -maxdepth 1 -type f -name "qtv*" | head -n1)
              FILENAME=$(basename "${FILE_PATH}")    # qtv or qtv.exe

              DIR_NAME=$(basename "${DIR_PATH}")     # qtv-linux-amd64
              OS_ARCH="${DIR_NAME#qtv-}"             # linux-amd64
              OS="${OS_ARCH%-*}"                     # linux
              ARCH="${OS_ARCH##*-}"                  # amd64

              CHECKSUM_PATH="${FILE_PATH}.md5"
              md5sum "${FILE_PATH}" > "${CHECKSUM_PATH}"

              if $IS_RELEASE; then
                  VERSION_DIR="${LOCAL_BASE_DIR}/${GITHUB_REF_NAME}/${OS}/${ARCH}"
              else
                  VERSION_DIR="${LOCAL_BASE_DIR}/${OS}/${ARCH}"
              fi

              LATEST_DIR="${LOCAL_BASE_DIR}/latest/${OS}/${ARCH}"

              mkdir -p "${VERSION_DIR}" "${LATEST_DIR}"

              if $IS_RELEASE; then
                  cp "${FILE_PATH}" "${VERSION_DIR}/${FILENAME}"
                  cp "${CHECKSUM_PATH}" "${VERSION_DIR}/${FILENAME}.md5"
              else
                  TIMESTAMP=$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M%S')
                  SNAPSHOT_NAME="${TIMESTAMP}_${GITHUB_SHA::7}_${FILENAME}"
                  cp "${FILE_PATH}" "${VERSION_DIR}/${SNAPSHOT_NAME}"
                  cp "${CHECKSUM_PATH}" "${VERSION_DIR}/${SNAPSHOT_NAME}.md5"
              fi

              cp "${FILE_PATH}" "${LATEST_DIR}/${FILENAME}"
              cp "${CHECKSUM_PATH}" "${LATEST_DIR}/${FILENAME}.md5"
          done

          echo "Files to upload:"
          tree "${LOCAL_BASE_DIR}"

          # sftp -rp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P "${{ secrets.SFTP_PORT }}" "${{ secrets.SFTP_USERNAME }}"@"${{ secrets.SFTP_HOST }}" <<< $"put -rp ${LOCAL_BASE_DIR}/* ${REMOTE_BASE_DIR}"

name: main

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: freebsd
            arch: amd64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
          - os: openbsd
            arch: amd64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Build Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_DIR="build/${{ matrix.os }}/${{ matrix.arch }}"
          mkdir -p ${OUTPUT_DIR}
          go build -ldflags "-s -w" -o ${OUTPUT_DIR} ./...

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: build/*
          compression-level: 9
          retention-days: 3

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build

      - name: Deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            WORK_DIR="releases"
          else
            WORK_DIR="snapshots"
          fi

          # Populate versioned dirs/files
          mkdir -p ${WORK_DIR}/latest

          if [[ "$WORK_DIR" == "releases" ]]; then
            VERSION_DIR=${WORK_DIR}/${GITHUB_REF_NAME}
            mkdir -p ${VERSION_DIR}
            cp -r build/* ${VERSION_DIR}   # uploads/releases/x.y.z/**/*
          else
            cp -r build/* ${WORK_DIR}

            # prepend each filename with snapshot details
            PREFIX="$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M%S')_${GITHUB_SHA:0:7}" # 20260302-211855_cb79d6b

            find "$WORK_DIR" -type f -name "qtv*" | while read -r FILE_PATH; do
              DIR=$(dirname "$FILE_PATH")
              FILENAME=$(basename "$FILE_PATH")
              mv "$FILE_PATH" "${DIR}/${PREFIX}_${FILENAME}"
            done
          fi

          # Populate latest
          mv build/* ${WORK_DIR}/latest

          # Generate md5 checksums
          find "$WORK_DIR" -type f -name "*qtv*" | while read -r FILE; do
            md5sum "$FILE" | awk '{print $1}' > "$FILE.md5"
          done

          echo "Files in WORK_DIR:"
          tree "${WORK_DIR}"

          # sftp -rp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P "${{ secrets.SFTP_PORT }}" "${{ secrets.SFTP_USERNAME }}"@"${{ secrets.SFTP_HOST }}" <<< $"put -rp ${WORK_DIR}/* /"

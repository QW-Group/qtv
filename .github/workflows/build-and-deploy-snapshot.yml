name: build and deploy snapshots
on: [push]

jobs:
  build:
    if: github.repository == 'QW-Group/qtv'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-arm
            os: linux
            arch: arm
            ext: ""
          - target: linux-arm64
            os: linux
            arch: arm64
            ext: ""
          - target: linux-amd64
            os: linux
            arch: amd64
            ext: ""
          - target: windows-amd64
            os: windows
            arch: amd64
            ext: ".exe"
          - target: freebsd-amd64
            os: freebsd
            arch: amd64
            ext: ""
          - target: openbsd-amd64
            os: openbsd
            arch: amd64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build/${{ matrix.target }}
          go build -ldflags "-s -w" -o build/${{ matrix.target }}/qtv${{ matrix.ext }} ./...

      - name: Create checksum
        run: |
          md5sum build/${{ matrix.target }}/qtv${{ matrix.ext }} > build/${{ matrix.target }}/qtv.md5

      - name: Setup SSH
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Set date
        run: |
          echo "DATE=$(TZ='Europe/Amsterdam' date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Deploy snapshot
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          SNAP_PATH="upload/snapshots/${{ matrix.os }}/${{ matrix.arch }}"
          LATEST_PATH="upload/snapshots/latest/${{ matrix.os }}/${{ matrix.arch }}"
          mkdir -p "$SNAP_PATH"
          mkdir -p "$LATEST_PATH"
          cp build/${{ matrix.target }}/qtv${{ matrix.ext }} "$SNAP_PATH/${{ env.DATE }}_${SHORT_SHA}_qtv${{ matrix.ext }}"
          cp build/${{ matrix.target }}/qtv.md5 "$SNAP_PATH/${{ env.DATE }}_${SHORT_SHA}_qtv.md5"
          cp build/${{ matrix.target }}/qtv${{ matrix.ext }} "$LATEST_PATH/qtv${{ matrix.ext }}"
          cp build/${{ matrix.target }}/qtv.md5 "$LATEST_PATH/qtv.md5"
          sftp -rp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:/snapshots <<< $'put -rp upload/snapshots/*'
